<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Bearings — Navigate the Classroom 🧭</title>
<style>
  :root{
    --bg:#0b1020;
    --bg2:#131a32;
    --ink:#eef2ff;
    --muted:#9fb0d8;
    --accent:#ffd34d;
    --accent2:#4dd6ff;
    --good:#54e6a0;
    --bad:#ff6b8a;
    --north:#ff5a6e;
    --card:#1b2240;
    --line:#2c365f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%, #1a2350 0%, var(--bg) 60%);
    color:var(--ink);
    overflow:hidden;
  }

  /* ---- Board / North banner ---- */
  #northBanner{
    position:fixed;top:0;left:0;right:0;height:34px;
    background:linear-gradient(90deg, transparent, rgba(255,90,110,.18), transparent);
    border-bottom:2px solid var(--north);
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-weight:800;letter-spacing:3px;font-size:13px;color:#ffd9df;
    text-transform:uppercase;z-index:50;
  }
  #northBanner .arrow{color:var(--north);animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

  /* ---- Slide system ---- */
  .deck{position:fixed;inset:34px 0 64px 0;}
  .slide{
    position:absolute;inset:0;
    display:none;flex-direction:column;align-items:center;justify-content:center;
    padding:24px 48px;text-align:center;
    animation:fade .45s ease;
  }
  .slide.active{display:flex;}
  @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  h1{font-size:clamp(34px,6vw,64px);margin:0 0 6px;line-height:1.05;}
  h2{font-size:clamp(26px,4vw,42px);margin:0 0 16px;}
  .sub{color:var(--muted);font-size:clamp(16px,2vw,22px);max-width:900px;}
  .tag{
    display:inline-block;background:var(--accent);color:#1a1300;font-weight:800;
    padding:6px 16px;border-radius:999px;font-size:14px;letter-spacing:1px;margin-bottom:18px;
    text-transform:uppercase;
  }
  .tag.game{background:var(--accent2);color:#00222e;}
  .tag.pair{background:var(--good);color:#003322;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px 26px;margin-top:18px;max-width:760px;
  }
  .rules{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:18px;}
  .rule{
    background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    width:230px;text-align:left;
  }
  .rule b{color:var(--accent);font-size:18px;}
  .rule p{margin:8px 0 0;color:var(--muted);font-size:15px;}

  .big{font-size:clamp(40px,8vw,90px);font-weight:900;color:var(--accent);letter-spacing:2px;}
  .pill{font-family:"Courier New",monospace;background:#000a1f;border:1px solid var(--accent2);
    color:var(--accent2);padding:4px 12px;border-radius:8px;font-weight:800;}

  /* ---- Compass ---- */
  .compassWrap{position:relative;width:min(46vh,360px);aspect-ratio:1;margin:8px auto;}
  .compass{width:100%;height:100%;}
  .needle{transform-origin:50% 50%;transition:transform .8s cubic-bezier(.2,.9,.2,1);}

  /* ---- Buttons ---- */
  .btn{
    cursor:pointer;border:none;border-radius:12px;font-weight:800;font-size:16px;
    padding:12px 22px;background:var(--accent);color:#1a1300;transition:transform .1s, filter .2s;
  }
  .btn:hover{filter:brightness(1.08);transform:translateY(-1px);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn.blue{background:var(--accent2);color:#00222e;}
  .choices{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px;}
  .choice{
    cursor:pointer;font-family:"Courier New",monospace;font-weight:800;font-size:22px;
    background:var(--bg2);border:2px solid var(--line);color:var(--ink);
    padding:14px 26px;border-radius:14px;transition:.15s;min-width:110px;
  }
  .choice:hover{border-color:var(--accent2);transform:translateY(-2px);}
  .choice.correct{background:var(--good);color:#003322;border-color:var(--good);animation:pop .3s;}
  .choice.wrong{background:var(--bad);color:#330011;border-color:var(--bad);opacity:.85;}
  @keyframes pop{50%{transform:scale(1.12)}}
  .feedback{margin-top:16px;font-size:20px;font-weight:800;min-height:28px;}
  .feedback.good{color:var(--good);}
  .feedback.bad{color:var(--bad);}

  .reveal{margin-top:18px;}
  .answer{display:none;margin-top:16px;font-size:22px;color:var(--good);font-weight:800;}
  .answer.show{display:block;animation:fade .3s;}

  /* ---- HUD / nav ---- */
  #hud{
    position:fixed;bottom:0;left:0;right:0;height:64px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;background:rgba(8,12,28,.85);border-top:1px solid var(--line);
    backdrop-filter:blur(6px);z-index:50;
  }
  #hud .nav{display:flex;gap:10px;align-items:center;}
  #dots{display:flex;gap:6px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--line);transition:.2s;cursor:pointer;}
  .dot.on{background:var(--accent);transform:scale(1.3);}
  #score{font-weight:800;color:var(--accent);font-size:16px;}
  #score span{color:var(--ink);}
  #progress{position:fixed;bottom:64px;left:0;height:3px;background:var(--accent2);width:0;z-index:51;transition:width .3s;}

  .kbd{font-family:"Courier New",monospace;background:#000a1f;border:1px solid var(--line);
    padding:2px 8px;border-radius:6px;font-size:13px;color:var(--muted);}

  .twoCol{display:flex;gap:30px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .floor{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:20px;width:min(90vw,520px);}
  ol.steps{text-align:left;font-size:18px;line-height:1.8;color:var(--ink);max-width:640px;}
  ol.steps li{margin-bottom:6px;}
  .hl{color:var(--accent);font-weight:800;}
  .hl2{color:var(--accent2);font-weight:800;}
  .small{font-size:14px;color:var(--muted);}
  .emoji{font-size:1.2em;}
  .timer{font-family:"Courier New",monospace;font-size:40px;font-weight:900;color:var(--accent2);}
</style>
</head>
<body>

<div id="northBanner"><span class="arrow">▲</span> The Board is NORTH (000°) <span class="arrow">▲</span></div>
<div id="progress"></div>
<div class="deck" id="deck"></div>

<div id="hud">
  <div id="score">⭐ Score: <span id="scoreVal">0</span></div>
  <div id="dots"></div>
  <div class="nav">
    <button class="btn ghost" onclick="prev()">◀ Back</button>
    <button class="btn" onclick="next()">Next ▶</button>
  </div>
</div>

<script>
/* ============================================================
   TRUE BEARINGS — slide-by-slide classroom game
   Running rule: the BOARD at the front of the room = NORTH (000°)
   Bearings measured CLOCKWISE from North, always 3 digits.
   ============================================================ */

let score = 0;
function addScore(n){ score += n; document.getElementById('scoreVal').textContent = score; }

/* Build a compass SVG. opts: {bearing, label, showNeedle, showDegrees} */
function compass(opts={}){
  const b = opts.bearing ?? null;
  const showNeedle = opts.showNeedle ?? (b!==null);
  const lbl = opts.label ?? '';
  const ticks = [];
  for(let a=0;a<360;a+=30){
    const major = a%90===0;
    const r1 = major?70:78, r2=88;
    const rad=(a-90)*Math.PI/180;
    ticks.push(`<line x1="${100+r1*Math.cos(rad)}" y1="${100+r1*Math.sin(rad)}" x2="${100+r2*Math.cos(rad)}" y2="${100+r2*Math.sin(rad)}" stroke="${major?'#4dd6ff':'#3a466f'}" stroke-width="${major?3:1.5}"/>`);
  }
  // degree numbers every 45
  const nums=[];
  for(let a=0;a<360;a+=45){
    const rad=(a-90)*Math.PI/180;
    const x=100+58*Math.cos(rad), y=100+58*Math.sin(rad)+5;
    nums.push(`<text x="${x}" y="${y}" fill="#6f7fb0" font-size="11" text-anchor="middle" font-family="Courier New">${String(a).padStart(3,'0')}</text>`);
  }
  const needle = showNeedle && b!==null ? `
    <g class="needle" style="transform:rotate(${b}deg)">
      <polygon points="100,22 108,100 100,112 92,100" fill="#ffd34d"/>
      <line x1="100" y1="100" x2="100" y2="112" stroke="#ffd34d" stroke-width="4"/>
      <circle cx="100" cy="100" r="6" fill="#fff"/>
    </g>` : '';
  return `
  <div class="compassWrap">
    <svg class="compass" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="92" fill="#0c1330" stroke="#2c365f" stroke-width="2"/>
      <circle cx="100" cy="100" r="70" fill="none" stroke="#1c264a" stroke-width="1"/>
      ${ticks.join('')}
      ${nums.join('')}
      <text x="100" y="16" fill="#ff5a6e" font-size="16" font-weight="900" text-anchor="middle">N</text>
      <text x="190" y="105" fill="#9fb0d8" font-size="14" font-weight="800" text-anchor="middle">E</text>
      <text x="100" y="198" fill="#9fb0d8" font-size="14" font-weight="800" text-anchor="middle">S</text>
      <text x="10" y="105" fill="#9fb0d8" font-size="14" font-weight="800" text-anchor="middle">W</text>
      ${needle}
    </svg>
    ${lbl?`<div style="margin-top:6px;font-weight:800;color:#9fb0d8">${lbl}</div>`:''}
  </div>`;
}

/* Multiple-choice quiz block. correct = string of correct value */
function quiz(id, choicesArr, correct, points, explain){
  const btns = choicesArr.map(c=>`<button class="choice" data-v="${c}" onclick="answer('${id}','${c}','${correct}',${points})">${c}</button>`).join('');
  return `<div class="choices" id="q_${id}">${btns}</div>
    <div class="feedback" id="fb_${id}"></div>
    <div class="answer" id="ex_${id}">${explain||''}</div>`;
}
function answer(id, picked, correct, points){
  const box=document.getElementById('q_'+id);
  if(box.dataset.done) return;
  box.dataset.done='1';
  const fb=document.getElementById('fb_'+id);
  [...box.children].forEach(b=>{
    if(b.dataset.v===correct) b.classList.add('correct');
    else if(b.dataset.v===picked) b.classList.add('wrong');
  });
  if(picked===correct){ fb.textContent='✅ Spot on, navigator!'; fb.className='feedback good'; addScore(points); }
  else { fb.textContent='❌ Not quite — see the green one.'; fb.className='feedback bad'; }
  const ex=document.getElementById('ex_'+id); if(ex) ex.classList.add('show');
}
function toggleAnswer(id){ document.getElementById(id).classList.toggle('show'); }

/* ---------------- SLIDES ---------------- */
const slides = [

/* 0 — Title */
`<span class="tag">🧭 Maths Mission</span>
 <h1>True Bearings</h1>
 <p class="sub">Navigate the classroom. The <b style="color:var(--north)">front board is North</b>. Find your way, score points, and out-navigate your partner.</p>
 ${compass({bearing:0, showNeedle:true})}
 <p class="small">Press <span class="kbd">→</span> or click <b>Next</b> to set sail. Use <span class="kbd">←</span> to go back.</p>`,

/* 1 — The rule of the room */
`<span class="tag">🎯 The Golden Rule</span>
 <h2>The board at the front = <span style="color:var(--north)">NORTH</span></h2>
 <p class="sub">For this whole lesson, imagine a giant compass on the floor. Whichever way you face the <b style="color:var(--north)">front board</b>, that is <b>000° — due North</b>. Everything else is measured from there.</p>
 <div class="rules">
   <div class="rule"><b>Front board</b><p>North · 000°</p></div>
   <div class="rule"><b>Right wall</b><p>East · 090°</p></div>
   <div class="rule"><b>Back wall</b><p>South · 180°</p></div>
   <div class="rule"><b>Left wall</b><p>West · 270°</p></div>
 </div>
 <p class="small">👉 Stand up, face the board — you are now facing North!</p>`,

/* 2 — What is a bearing (3 rules) */
`<span class="tag">📐 Decode It</span>
 <h2>What makes a <i>true bearing</i>?</h2>
 <div class="rules">
   <div class="rule"><b>1 · From North</b><p>Always start measuring from the North line (the board).</p></div>
   <div class="rule"><b>2 · Clockwise</b><p>Turn clockwise — the way a clock's hands move. ↻</p></div>
   <div class="rule"><b>3 · Three digits</b><p>Always 3 figures: 5° → <span class="pill">005°</span>, 60° → <span class="pill">060°</span>.</p></div>
 </div>
 <p class="sub" style="margin-top:18px">So a bearing is just: <b class="hl">how far clockwise from the board</b> do you have to turn?</p>`,

/* 3 — Compass to bearing match (interactive) */
`<span class="tag game">🕹️ Round 1 · Warm-up</span>
 <h2>The right wall (East) has what bearing?</h2>
 ${compass({bearing:90})}
 ${quiz('east', ['045°','090°','180°','270°'], '090°', 10, '↻ A quarter-turn clockwise from the board = <b>090°</b>. East!')}`,

/* 4 — Read the needle 1 */
`<span class="tag game">🕹️ Round 2 · Read the Needle</span>
 <h2>What bearing is the needle pointing on?</h2>
 ${compass({bearing:135})}
 ${quiz('r135', ['045°','090°','135°','225°'], '135°', 15, 'Halfway between East (090°) and South (180°) = <b>135°</b> — that\\'s South-East.')}`,

/* 5 — Read the needle 2 */
`<span class="tag game">🕹️ Round 3 · Trickier</span>
 <h2>And this one?</h2>
 ${compass({bearing:240})}
 ${quiz('r240', ['210°','240°','300°','120°'], '240°', 15, 'Past South (180°), keep turning clockwise: 180 + 60 = <b>240°</b>.')}`,

/* 6 — Estimate / draw it */
`<span class="tag game">🕹️ Round 4 · Your Brain Compass</span>
 <h2>Which way is <span class="pill">315°</span>?</h2>
 <p class="sub">Picture the board as North, then turn 315° clockwise. Which corner of the room are you facing?</p>
 ${quiz('e315', ['Front-right','Back-right','Back-left','Front-left'], 'Front-left', 20, '315° is 45° short of a full turn — the <b>North-West</b>, i.e. the front-left corner. ↖')}
 <div style="margin-top:18px">${compass({bearing:315})}</div>`,

/* 7 — Body bearings (stand & point) */
`<span class="tag">🙆 Stand & Point</span>
 <h2>Become the compass</h2>
 <p class="sub">Everyone stand and <b>face the board (North)</b>. On the call, point your arm to the bearing:</p>
 <div class="card" style="text-align:left">
   <p style="font-size:20px;line-height:2;margin:0">
     🔔 <b class="hl">090°</b> → point to the right wall<br>
     🔔 <b class="hl">180°</b> → point behind you (back wall)<br>
     🔔 <b class="hl">270°</b> → point to the left wall<br>
     🔔 <b class="hl2">045°</b> → point to the front-right corner<br>
     🔔 <b class="hl2">225°</b> → point to the back-left corner
   </p>
 </div>
 <p class="small">Mr Wong calls a bearing, you snap to it. Wrong-pointers sit down — last one standing wins! 🏆</p>`,

/* 8 — PAIR ACTIVITY intro */
`<span class="tag pair">👯 Pair Mission</span>
 <h2>Find your partner's bearing</h2>
 <p class="sub">Time to navigate to a real person. Grab a partner and stand a few steps apart — anywhere in the room.</p>
 <div class="floor">
   <ol class="steps">
     <li>Both <b class="hl">face the front board</b> (you're both facing North). ▲</li>
     <li>Player A: <b>without turning your feet</b>, figure out the bearing you'd turn through to face Player B.</li>
     <li>Turn clockwise from North until you point at your partner — read the angle.</li>
     <li>Say it out loud as a 3-figure bearing: e.g. <span class="pill">068°</span>.</li>
     <li>Now swap — Player B finds the bearing back to Player A.</li>
   </ol>
 </div>
 <p class="small">Use a phone compass or just estimate against the walls (right=090°, back=180°, left=270°).</p>`,

/* 9 — Pair activity: the twist (back bearings) */
`<span class="tag pair">👯 Pair Mission · The Twist</span>
 <h2>Compare your two bearings 🔁</h2>
 <p class="sub">Bearing of <b class="hl">B from A</b> and bearing of <b class="hl2">A from B</b> are <b>not the same</b>. Look at the difference…</p>
 <div class="twoCol">
   ${compass({bearing:70, label:'A → B = 070°'})}
   ${compass({bearing:250, label:'B → A = 250°'})}
 </div>
 <div class="card">
   <p style="font-size:20px;margin:0">They always differ by <b class="hl">180°</b>. This is the <b>back bearing</b>.<br>
   <span class="pill">+180 if under 180</span> &nbsp; <span class="pill">−180 if over 180</span></p>
 </div>
 <p class="small">Check with your partner: did your two bearings differ by exactly 180°? If not, re-measure! 🔍</p>`,

/* 10 — Back bearing quiz */
`<span class="tag game">🧮 Back-Bearing Challenge</span>
 <h2>The bearing of the canteen from school is <span class="pill">110°</span>.</h2>
 <p class="sub">What is the bearing of the <b>school from the canteen</b>?</p>
 ${quiz('back110', ['020°','110°','250°','290°'], '290°', 25, '110° is under 180°, so add 180°: 110 + 180 = <b>290°</b>.')}`,

/* 11 — Boss level: word problem */
`<span class="tag game">👑 Boss Level</span>
 <h2>Treasure hunt</h2>
 <p class="sub">From the door (face the board = North), the treasure is on a bearing of <b class="hl">200°</b> and 5 steps away.
 You walk there. What bearing must you walk on to get <b>back to the door</b>?</p>
 ${quiz('boss', ['020°','160°','200°','340°'], '020°', 30, '200° is over 180°, so subtract 180°: 200 − 180 = <b>020°</b>. Head almost due North-East back home! 🗺️')}
 <div style="margin-top:14px">${compass({bearing:200, label:'Out: 200°'})}</div>`,

/* 12 — Recap + exit */
`<span class="tag">🎓 Mission Debrief</span>
 <h1>You're a Navigator! 🧭</h1>
 <div class="card" style="text-align:left;max-width:680px">
   <p style="font-size:19px;line-height:1.9;margin:0">
   ✅ Bearings start from <b class="hl">North</b> (the board).<br>
   ✅ Measured <b class="hl">clockwise</b>. ↻<br>
   ✅ Always <b class="hl">3 figures</b> (007°, 045°, 315°).<br>
   ✅ Back bearing = <b class="hl">±180°</b>.</p>
 </div>
 <h2 style="margin-top:20px">Final Score: <span style="color:var(--accent)" id="finalScore">0</span> ⭐</h2>
 <p class="small">Exit ticket: write the bearing from your seat to the door. Face the board first! ✍️</p>`
];

/* ---------------- engine ---------------- */
let cur = 0;
const deck = document.getElementById('deck');
const dots = document.getElementById('dots');
slides.forEach((html,i)=>{
  const s=document.createElement('section');
  s.className='slide'+(i===0?' active':'');
  s.innerHTML=html;
  deck.appendChild(s);
  const d=document.createElement('div');
  d.className='dot'+(i===0?' on':'');
  d.onclick=()=>go(i);
  dots.appendChild(d);
});
const slideEls=[...document.querySelectorAll('.slide')];
const dotEls=[...document.querySelectorAll('.dot')];

function go(i){
  if(i<0||i>=slides.length) return;
  slideEls[cur].classList.remove('active');
  dotEls[cur].classList.remove('on');
  cur=i;
  slideEls[cur].classList.add('active');
  dotEls[cur].classList.add('on');
  document.getElementById('progress').style.width=((cur)/(slides.length-1)*100)+'%';
  const fs=document.getElementById('finalScore'); if(fs) fs.textContent=score;
}
function next(){ go(cur+1); }
function prev(){ go(cur-1); }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); next(); }
  if(e.key==='ArrowLeft'){ prev(); }
});
go(0);
</script>
</body>
</html>
